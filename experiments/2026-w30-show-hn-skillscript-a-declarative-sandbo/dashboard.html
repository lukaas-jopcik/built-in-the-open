<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skillcage — clean run vs. attack run</title>
<style>
  :root {
    --bg: #12121c;
    --panel: #1a1a2a;
    --periwinkle: #8fa3e8;
    --periwinkle-dim: #4c568f;
    --green: #6fd88f;
    --burgundy: #7a2331;
    --cream: #f3ead9;
    --ink: #cfd3e6;
    --muted: #6c7194;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at top, #191933 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: "SF Mono", "IBM Plex Mono", Menlo, Consolas, monospace;
    min-height: 100vh;
  }
  .wrap { max-width: 1240px; margin: 0 auto; padding: 28px 24px 60px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  h1 { font-size: 20px; letter-spacing: 0.06em; margin: 0; color: var(--cream); }
  h1 .dim { color: var(--muted); font-weight: normal; }
  #runLabel {
    font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 999px; border: 1px solid var(--periwinkle-dim);
    color: var(--periwinkle); transition: all 0.3s ease;
  }
  #runLabel.attack { color: var(--burgundy); border-color: var(--burgundy); background: rgba(122,35,49,0.12); }
  #runLabel.parallel { color: var(--periwinkle); border-color: var(--periwinkle); background: rgba(143,163,232,0.16); }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  #stage {
    position: relative;
    width: 100%; height: 460px;
    background: linear-gradient(180deg, var(--panel) 0%, #15152280 100%);
    border: 1px solid #2a2a44;
    border-radius: 14px;
    overflow: hidden;
  }
  #edges { position: absolute; inset: 0; width: 100%; height: 100%; }
  #edges line { stroke: #363a5c; stroke-width: 1.5; }
  #edges line.lit { stroke: var(--periwinkle); stroke-width: 2; }

  .node {
    position: absolute;
    width: 132px;
    transform: translate(-50%, -50%);
    text-align: center;
    transition: transform 0.25s ease;
  }
  .node .dot {
    width: 22px; height: 22px; margin: 0 auto 6px;
    border-radius: 50%;
    background: #2b2f4d;
    border: 2px solid #454a72;
    box-shadow: none;
    transition: all 0.35s ease;
  }
  .node .label { font-size: 12px; color: var(--ink); white-space: nowrap; }
  .node .timing { font-size: 10px; color: var(--muted); min-height: 14px; }

  .node.active .dot {
    background: var(--periwinkle);
    border-color: var(--periwinkle);
    box-shadow: 0 0 8px 3px rgba(143,163,232,0.35), 0 0 24px 10px rgba(143,163,232,0.18);
    animation: pulse 0.9s ease-in-out infinite alternate;
  }
  .node.ok .dot {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 6px 2px rgba(111,216,143,0.45);
    animation: none;
  }
  .node.blocked .dot {
    background: var(--burgundy);
    border-color: #b3475a;
    box-shadow: 0 0 10px 4px rgba(122,35,49,0.55);
    animation: shake 0.4s ease;
  }
  @keyframes pulse {
    from { box-shadow: 0 0 6px 2px rgba(143,163,232,0.3), 0 0 18px 8px rgba(143,163,232,0.12); }
    to   { box-shadow: 0 0 12px 5px rgba(143,163,232,0.55), 0 0 30px 14px rgba(143,163,232,0.24); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }

  .banner {
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    margin-top: 4px;
    background: var(--burgundy);
    color: var(--cream);
    font-size: 10px;
    line-height: 1.3;
    padding: 5px 8px;
    border-radius: 6px;
    width: 170px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    opacity: 0;
    animation: bannerIn 0.3s ease forwards;
    z-index: 5;
  }
  @keyframes bannerIn { from { opacity: 0; transform: translate(-50%, -4px); } to { opacity: 1; transform: translate(-50%, 0); } }

  #card {
    position: absolute;
    top: 24px; right: -320px;
    width: 260px;
    background: var(--panel);
    border: 1px solid var(--green);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    transition: right 0.5s cubic-bezier(.2,.8,.2,1);
  }
  #card.in { right: 24px; }
  #card h3 { margin: 0 0 8px; font-size: 13px; color: var(--green); letter-spacing: 0.08em; }
  #card .row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: var(--ink); }
  #card .row b { color: var(--cream); }

  #scoreboard {
    position: absolute;
    left: 50%; bottom: -80px;
    transform: translateX(-50%);
    width: 88%;
    text-align: center;
    background: linear-gradient(90deg, var(--burgundy), #591a24);
    color: var(--cream);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 15px;
    letter-spacing: 0.03em;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    transition: bottom 0.5s cubic-bezier(.2,.8,.2,1);
  }
  #scoreboard.in { bottom: 20px; }
  #scoreboard b { color: #fff; }

  #speedbadge {
    position: absolute;
    top: 24px; left: -320px;
    width: 280px;
    background: var(--panel);
    border: 1px solid var(--periwinkle);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    transition: left 0.5s cubic-bezier(.2,.8,.2,1);
  }
  #speedbadge.in { left: 24px; }
  #speedbadge b { color: var(--periwinkle); }

  .footer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  #status { color: var(--muted); font-size: 12px; }
  button {
    background: var(--periwinkle-dim); color: var(--cream); border: none;
    padding: 8px 18px; border-radius: 8px; font-family: inherit; font-size: 12px;
    letter-spacing: 0.08em; cursor: pointer; text-transform: uppercase;
  }
  button:hover { background: var(--periwinkle); color: #12121c; }
  button:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>SKILLCAGE <span class="dim">/ dashboard</span></h1>
    <span id="runLabel">idle</span>
  </header>
  <div class="subtitle">declarative DAG orchestration inside a pure-Python AST-whitelist sandbox — replaying <code>trace.jsonl</code> (clean → attack → parallel fan-out)</div>

  <div id="stage">
    <svg id="edges"></svg>
    <div id="nodeLayer"></div>
    <div id="card"><h3>REPORT</h3><div id="cardBody"></div></div>
    <div id="scoreboard"></div>
    <div id="speedbadge"></div>
  </div>

  <div class="footer-row">
    <span id="status">loading trace.jsonl…</span>
    <button id="replay" disabled>Replay</button>
  </div>
</div>

<script>
const STEP_DELAY_MS = 550;   // pause after a node lights up (start)
const END_DELAY_MS  = 650;   // pause after a node resolves (end/banner)
const RUN_GAP_MS    = 1400;  // pause between clean run and attack run
const STAGE_W = 1240 * 0.94; // approx usable stage width (rendered dynamically below)

const stage = document.getElementById('stage');
const edgesSvg = document.getElementById('edges');
const nodeLayer = document.getElementById('nodeLayer');
const runLabel = document.getElementById('runLabel');
const statusEl = document.getElementById('status');
const card = document.getElementById('card');
const cardBody = document.getElementById('cardBody');
const scoreboard = document.getElementById('scoreboard');
const speedbadge = document.getElementById('speedbadge');
const replayBtn = document.getElementById('replay');

const RUN_LABELS = { clean: 'clean run', attack: 'attack run', parallel: 'parallel fan-out' };

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function parseTrace(text) {
  return text.split('\n').filter((l) => l.trim().length).map((l) => JSON.parse(l));
}

function groupByRun(events) {
  const runs = [];
  const byName = {};
  for (const ev of events) {
    if (!byName[ev.run]) {
      byName[ev.run] = { name: ev.run, events: [] };
      runs.push(byName[ev.run]);
    }
    byName[ev.run].events.push(ev);
  }
  return runs;
}

function computeLayout(events) {
  const deps = {};
  const order = [];
  for (const ev of events) {
    if (ev.event === 'start' && !(ev.step_id in deps)) {
      deps[ev.step_id] = ev.deps || [];
      order.push(ev.step_id);
    }
  }
  const level = {};
  function levelOf(id) {
    if (id in level) return level[id];
    const d = deps[id] || [];
    level[id] = d.length ? 1 + Math.max(...d.map(levelOf)) : 0;
    return level[id];
  }
  order.forEach(levelOf);

  const byLevel = {};
  order.forEach((id) => {
    const l = level[id];
    (byLevel[l] = byLevel[l] || []).push(id);
  });
  const maxLevel = Math.max(...Object.values(level));
  const stageRect = stage.getBoundingClientRect();
  const W = stageRect.width, H = stageRect.height;
  const pos = {};
  Object.keys(byLevel).forEach((lvl) => {
    const ids = byLevel[lvl];
    const colX = maxLevel === 0 ? W / 2 : 70 + (W - 140) * (lvl / maxLevel);
    ids.forEach((id, i) => {
      const rowY = H * (i + 1) / (ids.length + 1);
      pos[id] = { x: colX, y: rowY };
    });
  });
  return { order, deps, pos };
}

function renderStage(order, deps, pos) {
  nodeLayer.innerHTML = '';
  edgesSvg.innerHTML = '';
  const stageRect = stage.getBoundingClientRect();
  edgesSvg.setAttribute('viewBox', `0 0 ${stageRect.width} ${stageRect.height}`);

  const lineEls = {};
  order.forEach((id) => {
    (deps[id] || []).forEach((d) => {
      if (!pos[d]) return;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', pos[d].x);
      line.setAttribute('y1', pos[d].y);
      line.setAttribute('x2', pos[id].x);
      line.setAttribute('y2', pos[id].y);
      edgesSvg.appendChild(line);
      lineEls[id + '<-' + d] = line;
    });
  });

  const nodeEls = {};
  order.forEach((id) => {
    const div = document.createElement('div');
    div.className = 'node';
    div.style.left = pos[id].x + 'px';
    div.style.top = pos[id].y + 'px';
    div.innerHTML = `<div class="dot"></div><div class="label">${id}</div><div class="timing"></div>`;
    nodeLayer.appendChild(div);
    nodeEls[id] = div;
  });
  return { lineEls, nodeEls };
}

function lightIncomingEdges(lineEls, deps, id) {
  (deps[id] || []).forEach((d) => {
    const line = lineEls[id + '<-' + d];
    if (line) line.classList.add('lit');
  });
}

// Consecutive start/end events sharing the same numeric "wave" (emitted by
// run_sky_parallel -- see executor.py) are batched and animated together,
// so independent nodes genuinely light up / settle simultaneously instead of
// one-at-a-time. Sequential runs (clean/attack) have no "wave" field, so
// their events never batch (wave === undefined never matches itself here).
function collectWaveBatch(events, i, eventType) {
  const first = events[i];
  const batch = [first];
  if (first.wave === undefined) return batch;
  let j = i + 1;
  while (j < events.length && events[j].event === eventType && events[j].wave === first.wave) {
    batch.push(events[j]);
    j++;
  }
  return batch;
}

async function playRun(run, els) {
  const { nodeEls, lineEls } = els;
  const events = run.events;
  let i = 0;
  while (i < events.length) {
    const ev = events[i];
    if (ev.event === 'start') {
      const batch = collectWaveBatch(events, i, 'start');
      batch.forEach((e) => {
        const node = nodeEls[e.step_id];
        node.classList.remove('ok', 'blocked');
        node.classList.add('active');
        lightIncomingEdges(lineEls, els.deps, e.step_id);
      });
      statusEl.textContent = batch.length > 1
        ? `${run.name.toUpperCase()} — wave ${ev.wave}: running ${batch.map((e) => e.step_id).join(', ')} concurrently`
        : `${run.name.toUpperCase()} — running ${ev.step_id} (tool=${ev.tool})`;
      await sleep(STEP_DELAY_MS);
      i += batch.length;
    } else if (ev.event === 'end') {
      const batch = collectWaveBatch(events, i, 'end');
      batch.forEach((e) => {
        const node = nodeEls[e.step_id];
        node.classList.remove('active');
        const timingEl = node.querySelector('.timing');
        timingEl.textContent = `${e.elapsed_ms.toFixed(3)}ms`;
        if (e.status === 'ok') {
          node.classList.add('ok');
        } else {
          node.classList.add('blocked');
          const banner = document.createElement('div');
          banner.className = 'banner';
          banner.textContent = `BLOCKED: ${e.reason}`;
          node.appendChild(banner);
        }
      });
      statusEl.textContent = batch.length > 1
        ? `${run.name.toUpperCase()} — wave ${ev.wave} settled: ${batch.map((e) => e.step_id).join(', ')}`
        : (ev.status === 'ok'
          ? `${run.name.toUpperCase()} — ${ev.step_id} OK (${ev.elapsed_ms.toFixed(3)}ms)`
          : `${run.name.toUpperCase()} — ${ev.step_id} BLOCKED (${ev.reason})`);
      await sleep(END_DELAY_MS);
      i += batch.length;
    } else if (ev.event === 'wave_done') {
      statusEl.textContent = `${run.name.toUpperCase()} — wave ${ev.wave} wall-clock: ${ev.elapsed_ms.toFixed(1)}ms for ${ev.size} concurrent step(s)`;
      await sleep(300);
      i += 1;
    } else if (ev.event === 'done') {
      if (run.name === 'attack') {
        const r = ev.result;
        scoreboard.innerHTML = `<b>${r.blocked}/${r.total}</b> attack vectors blocked, <b>${r.escaped}</b> escapes`;
        scoreboard.classList.add('in');
      } else if (run.name === 'parallel') {
        const waveEvents = run.events.filter((e) => e.event === 'wave_done');
        const endEvents = run.events.filter((e) => e.event === 'end');
        const actualMs = waveEvents.reduce((s, w) => s + w.elapsed_ms, 0);
        const sequentialEquivMs = endEvents.reduce((s, e) => s + e.elapsed_ms, 0);
        const speedup = actualMs > 0 ? sequentialEquivMs / actualMs : 0;
        speedbadge.innerHTML = `<b>${waveEvents[0] ? waveEvents[0].size : endEvents.length}</b> independent branches ran in one DAG wave<br>`
          + `wall-clock: <b>${actualMs.toFixed(1)}ms</b> concurrent vs <b>${sequentialEquivMs.toFixed(1)}ms</b> one-at-a-time<br>`
          + `<b>${speedup.toFixed(1)}x</b> real speedup — measured, not simulated`;
        speedbadge.classList.add('in');
      } else {
        const r = ev.result;
        cardBody.innerHTML = `
          <div class="row"><span>status</span><b>${r.status}</b></div>
          <div class="row"><span>total</span><b>${r.total}</b></div>
          <div class="row"><span>count</span><b>${r.count}</b></div>`;
        card.classList.add('in');
      }
      statusEl.textContent = `${run.name.toUpperCase()} run complete.`;
      await sleep(400);
      i += 1;
    } else {
      i += 1;
    }
  }
}

async function playAll(runs) {
  replayBtn.disabled = true;
  card.classList.remove('in');
  scoreboard.classList.remove('in');
  speedbadge.classList.remove('in');
  cardBody.innerHTML = '';
  scoreboard.innerHTML = '';
  speedbadge.innerHTML = '';

  for (let i = 0; i < runs.length; i++) {
    const run = runs[i];
    runLabel.textContent = RUN_LABELS[run.name] || run.name;
    runLabel.className = run.name === 'attack' ? 'attack' : (run.name === 'parallel' ? 'parallel' : '');
    const { order, deps, pos } = computeLayout(run.events);
    const els = renderStage(order, deps, pos);
    els.deps = deps;
    if (i > 0) await sleep(RUN_GAP_MS);
    await playRun(run, els);
  }
  statusEl.textContent = 'Replay finished — clean run, then attack run, then parallel fan-out, back to back.';
  replayBtn.disabled = false;
}

let cachedRuns = null;

async function main() {
  try {
    const res = await fetch('trace.jsonl', { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const events = parseTrace(text);
    cachedRuns = groupByRun(events);
    statusEl.textContent = `loaded ${events.length} events across ${cachedRuns.length} run(s). Starting…`;
    await sleep(500);
    await playAll(cachedRuns);
  } catch (err) {
    statusEl.textContent = `Could not load trace.jsonl (${err.message}). Run "python3 gen_trace.py" then serve this directory with "python3 -m http.server" (fetch() needs http://, not file://).`;
  }
}

replayBtn.addEventListener('click', () => { if (cachedRuns) playAll(cachedRuns); });

main();
</script>
</body>
</html>
